<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lexicon AI — Legal Intelligence Platform</title>
    <meta name="description" content="AI-powered legal intelligence platform with 100+ skills across 12 practice areas. Contract review, compliance, litigation support, and more." />
    <meta name="theme-color" content="#030814" />
    <meta name="color-scheme" content="dark" />

    <!-- Open Graph -->
    <meta property="og:title" content="Lexicon AI — Legal Intelligence Platform" />
    <meta property="og:description" content="AI-powered legal intelligence with 100+ skills across 12 practice areas" />
    <meta property="og:type" content="website" />

    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚖️</text></svg>" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Preload critical CSS -->
    <style>
      /* Critical CSS for above-the-fold content */
      body {
        margin: 0;
        background: #030814;
        color: #E2E8F0;
        font-family: 'DM Sans', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root {
        min-height: 100vh;
      }
      .loading-screen {
        position: fixed;
        inset: 0;
        background: #030814;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 24px;
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      .loading-screen.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-logo {
        font-size: 48px;
        animation: pulse 2s infinite;
      }
      .loading-text {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 24px;
        color: #D4AF37;
        letter-spacing: 2px;
      }
      .loading-bar {
        width: 200px;
        height: 2px;
        background: rgba(212,175,55,0.1);
        border-radius: 2px;
        overflow: hidden;
      }
      .loading-bar-inner {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #D4AF37, #E8C84A);
        border-radius: 2px;
        animation: loadProgress 1.5s ease forwards;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.6; transform: scale(1.1); }
      }
      @keyframes loadProgress {
        0% { width: 0%; }
        100% { width: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div class="loading-screen" id="loading-screen">
      <div class="loading-logo">⚖️</div>
      <div class="loading-text">Lexicon AI</div>
      <div class="loading-bar">
        <div class="loading-bar-inner"></div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Hide loading screen after app mounts
      window.addEventListener('load', () => {
        setTimeout(() => {
          const loader = document.getElementById('loading-screen');
          if (loader) {
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 500);
          }
        }, 1800);
      });
    </script>
  </body>
</html>
